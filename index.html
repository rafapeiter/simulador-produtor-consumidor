<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Produtor-Consumidor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    
    <style>
        /* CSS mínimo apenas para o que o Bootstrap não cobre nativamente (o buffer circular) */
        .slot {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            position: relative;
            transition: all 0.3s ease;
        }

        .slot.empty {
            background-color: #f8f9fa; /* bg-light */
            border: 2px dashed #adb5bd;
            color: transparent;
        }

        .slot.filled {
            background-color: #198754; /* bg-success */
            border: 2px solid #146c43;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .pointer {
            position: absolute;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
        }

        /* Azul para Entrada, Vermelho para Saída */
        .pointer.in { color: #0d6efd; top: -30px; } 
        .pointer.out { color: #dc3545; bottom: -30px; }

        .log-box {
            height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body class="bg-light py-5">

    <div class="container">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold text-dark">Simulador Produtor-Consumidor</h1>            
        </div>

        <div class="row g-4 mb-5 text-center align-items-center">
            
            <div class="col-md-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body">
                        <h4 class="card-title text-primary">🏭 Produtor</h4>
                        <label for="prod-speed" class="form-label mt-3 text-muted">Velocidade de Produção:</label>
                        <select id="prod-speed" class="form-select border-primary-subtle">
                            <option value="random">Aleatória (Caos real)</option>
                            <option value="fast">Rápida (0.5s)</option>
                            <option value="slow">Lenta (2.0s)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow border-primary h-100">
                    <div class="card-body d-flex flex-column justify-content-center align-items-center py-4">
                        <button id="btn-toggle" class="btn btn-success btn-lg w-100 mb-3 fw-bold" onclick="toggleSimulation()">
                            ▶ Iniciar Simulação
                        </button>
                        <span id="buffer-status" class="badge rounded-pill text-bg-primary fs-6 px-4 py-2">
                            Itens no Buffer: 0 / 5
                        </span>
                        <div class="d-flex flex-wrap justify-content-center gap-2 mt-3">
                            <span id="sem-empty" class="badge bg-info text-white">vagas: 5</span>
                            <span id="sem-full" class="badge text-bg-dark">ocupado: 0</span>
                            <span id="sem-mutex" class="badge text-bg-success">mutex: 1</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body">
                        <h4 class="card-title text-danger">🛒 Consumidor</h4>
                        <label for="cons-speed" class="form-label mt-3 text-muted">Velocidade de Consumo:</label>
                        <select id="cons-speed" class="form-select border-danger-subtle">
                            <option value="random">Aleatória (Caos real)</option>
                            <option value="fast">Rápida (0.5s)</option>
                            <option value="slow">Lenta (2.0s)</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-center gap-3 my-5 py-4" id="buffer-ui">
            </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white text-primary fw-bold border-bottom-0 pt-3">
                        Terminal do Produtor
                    </div>
                    <div class="card-body log-box border rounded-bottom" id="log-prod"></div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white text-danger fw-bold border-bottom-0 pt-3">
                        Terminal do Consumidor
                    </div>
                    <div class="card-body log-box border rounded-bottom" id="log-cons"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TAM_BUFFER = 5;
        let buffer = new Array(TAM_BUFFER).fill(null);
        let in_ptr = 0;
        let out_ptr = 0;
        let count = 0;
        let itemCounter = 0;

        let semEmpty = TAM_BUFFER;
        let semFull = 0;
        let semMutex = 1;
        
        let isRunning = false;
        let prodTimeout, consTimeout;

        // Inicializa a UI do Buffer
        const bufferUI = document.getElementById('buffer-ui');
        for (let i = 0; i < TAM_BUFFER; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot empty';
            slot.id = `slot-${i}`;
            
            const pIn = document.createElement('div');
            pIn.className = 'pointer in';
            pIn.id = `in-${i}`;
            pIn.innerText = i === 0 ? '⬇ IN' : '';
            
            const pOut = document.createElement('div');
            pOut.className = 'pointer out';
            pOut.id = `out-${i}`;
            pOut.innerText = i === 0 ? '⬆ OUT' : '';

            slot.appendChild(pIn);
            slot.appendChild(pOut);
            bufferUI.appendChild(slot);
        }

        function updateUI() {
            // Atualiza a Badge central
            const statusBadge = document.getElementById('buffer-status');
            statusBadge.innerText = `Itens no Buffer: ${count} / ${TAM_BUFFER}`;

            document.getElementById('sem-empty').innerText = `vagas: ${semEmpty}`;
            document.getElementById('sem-full').innerText = `ocupadas: ${semFull}`;
            document.getElementById('sem-mutex').innerText = `mutex: ${semMutex}`;
            
            // Muda a cor da badge se o buffer estiver no limite (cheio ou vazio)
            if (count === TAM_BUFFER) statusBadge.className = "badge rounded-pill text-bg-warning fs-6 px-4 py-2 text-dark";
            else if (count === 0) statusBadge.className = "badge rounded-pill text-bg-secondary fs-6 px-4 py-2";
            else statusBadge.className = "badge rounded-pill text-bg-primary fs-6 px-4 py-2";
            
            for (let i = 0; i < TAM_BUFFER; i++) {
                const slot = document.getElementById(`slot-${i}`);
                document.getElementById(`in-${i}`).innerText = (i === in_ptr) ? '⬇ IN' : '';
                document.getElementById(`out-${i}`).innerText = (i === out_ptr) ? '⬆ OUT' : '';
                
                if (buffer[i] !== null) {
                    slot.classList.remove('empty');
                    slot.classList.add('filled');
                    let pInHTML = document.getElementById(`in-${i}`).outerHTML;
                    let pOutHTML = document.getElementById(`out-${i}`).outerHTML;
                    slot.innerHTML = pInHTML + pOutHTML + buffer[i];
                } else {
                    slot.classList.add('empty');
                    slot.classList.remove('filled');
                    let pInHTML = document.getElementById(`in-${i}`).outerHTML;
                    let pOutHTML = document.getElementById(`out-${i}`).outerHTML;
                    slot.innerHTML = pInHTML + pOutHTML;
                }
            }
        }

        // Adiciona mensagens formatadas com classes do Bootstrap
        function logMsg(target, msg, type) {
            const box = document.getElementById(`log-${target}`);
            const p = document.createElement('p');
            p.className = "mb-1 ";
            
            if(type === 'prod') p.className += "text-success";
            else if(type === 'cons') p.className += "text-danger";
            else if(type === 'wait') p.className += "text-warning text-dark fw-bold bg-warning-subtle px-2 rounded";
            
            p.innerText = msg;
            box.appendChild(p);
            box.scrollTop = box.scrollHeight; // Auto-scroll
        }

        function getDelay(speedType) {
            if (speedType === 'fast') return 500;
            if (speedType === 'slow') return 2000;
            return Math.floor(Math.random() * 2000) + 500;
        }

        function produtorLoop() {
            if (!isRunning) return;

            if (semEmpty === 0) {
                logMsg('prod', '[Semáforo] 🛑 Buffer CHEIO. Produtor dormindo...', 'wait');
            } else {
                semEmpty--;
                semMutex--;

                itemCounter++;
                buffer[in_ptr] = itemCounter;
                logMsg('prod', `[+] Produziu item ${itemCounter} (posição ${in_ptr})`, 'prod');
                
                in_ptr = (in_ptr + 1) % TAM_BUFFER;
                count++;

                semMutex++;
                semFull++;
                updateUI();
            }

            if (semEmpty === 0 || semFull === 0) updateUI();

            const speed = document.getElementById('prod-speed').value;
            prodTimeout = setTimeout(produtorLoop, getDelay(speed));
        }

        function consumidorLoop() {
            if (!isRunning) return;

            if (semFull === 0) {
                logMsg('cons', '[Semáforo] 🛑 Buffer VAZIO. Consumidor dormindo...', 'wait');
            } else {
                semFull--;
                semMutex--;

                const item = buffer[out_ptr];
                buffer[out_ptr] = null;
                logMsg('cons', `[-] Consumiu item ${item} (posição ${out_ptr})`, 'cons');
                
                out_ptr = (out_ptr + 1) % TAM_BUFFER;
                count--;

                semMutex++;
                semEmpty++;
                updateUI();
            }

            if (semEmpty === 0 || semFull === 0) updateUI();

            const speed = document.getElementById('cons-speed').value;
            consTimeout = setTimeout(consumidorLoop, getDelay(speed));
        }

        function toggleSimulation() {
            isRunning = !isRunning;
            const btn = document.getElementById('btn-toggle');
            
            if (isRunning) {
                btn.innerHTML = "⏸ Parar Simulação";
                btn.classList.replace("btn-success", "btn-danger");
                produtorLoop();
                consumidorLoop();
            } else {
                btn.innerHTML = "▶ Iniciar Simulação";
                btn.classList.replace("btn-danger", "btn-success");
                clearTimeout(prodTimeout);
                clearTimeout(consTimeout);
            }
        }

        updateUI();
    </script>
</body>
</html>
